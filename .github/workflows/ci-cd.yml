name: CI/CD — MeetingAI Backend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Job 1: Install & Audit ────────────────────────────────
  build:
    name: Build & Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Check for vulnerabilities
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Verify server file exists
        working-directory: backend
        run: |
          test -f server.js && echo "✅ server.js found" || exit 1
          test -f package.json && echo "✅ package.json found" || exit 1

      - name: Build summary
        run: |
          echo "================================"
          echo "  ✅ Build Complete"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "================================"

  # ── Job 2: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" && echo "✅ Deploy triggered"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK_URL not set — skipping deploy"
          fi

      - name: Deployment summary
        run: |
          echo "================================"
          echo "  ✅ CI/CD Pipeline Complete"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "================================"